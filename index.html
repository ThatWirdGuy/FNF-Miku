<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Friday Night Funkin' Hatsune Miku</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	
	<link rel="shortcut icon" type="image/png" href="./favicon.png">
	
	<script>
		// Global Error Handler
		window.onerror = function (msg, url, line, col, error) {
			alert("CODE ERROR FOUND:\n\nFile: " + url + "\nLine: " + line + "\nError: " + msg);
			return false;
		};

		function initGame() {
			try {
				if (typeof lime !== "undefined") {
					lime.embed ("Newb", "openfl-content", 1280, 720, { parameters: {} });
				} else {
					alert("The file loaded, but the 'lime' engine is missing inside it.");
				}
			} catch (e) {
				alert("Runtime Error: " + e.message);
			}
		}
	</script>

	<script type="text/javascript" src="./Newb.js?v=1" onerror="alert('Could not find Newb.js')"></script>
	
	<style>
		html,body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
		#openfl-content { width: 100%; height: 100%; }
	</style>
</head>
<body>
	<div id="openfl-content"></div>
	<script type="text/javascript">
		window.onload = function() {
			// Small delay to ensure the script is parsed
			setTimeout(initGame, 100);
		};
	</script>
</body>
</html>
