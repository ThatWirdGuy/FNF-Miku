<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Friday Night Funkin' Hatsune Miku</title>
	<meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<meta name="apple-mobile-web-app-capable" content="yes">
	
	<link rel="shortcut icon" type="image/png" href="./favicon.png">
	
	<script>
		// 1. Global Error Catcher
		window.onerror = function (msg, url, line) {
			alert("Error: " + msg + "\nURL: " + url + "\nLine: " + line);
			return false;
		};

		// 2. This function starts the game ONLY after the script is confirmed loaded
		function startGame() {
			try {
				if (typeof lime !== "undefined") {
					lime.embed ("Newb", "openfl-content", 1280, 720, { parameters: {} });
				} else {
					alert("FILE LOADED BUT LIME MISSING: The browser found Newb.js, but the 'lime' engine isn't inside it. Is the file empty or named incorrectly?");
				}
			} catch (e) {
				alert("Embed Crash: " + e.message);
			}
		}
	</script>

	<script 
		type="text/javascript" 
		src="./Newb.js" 
		onerror="alert('404 NOT FOUND: The browser could not find the file at: ' + this.src + '\n\nPlease check if Newb.js is in the root folder of your Vercel project.')">
	</script>
	
	<style>
		html,body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
		#openfl-content { width: 100%; height: 100%; }
		
		@font-face { font-family: 'Pixel Arial 11 Bold'; src: url('assets/fonts/pixel.otf'); }
		@font-face { font-family: 'VCR OSD Mono'; src: url('assets/fonts/vcr.ttf'); }
	</style>
</head>
<body>
	
	<noscript>Please enable JavaScript.</noscript>
	
	<div id="openfl-content"></div>
	
	<script type="text/javascript">
		// Wait for the window to be ready
		window.addEventListener('load', function() {
			// Give it a 500ms delay just to be safe for slow connections
			setTimeout(startGame, 500);
		});
	</script>
	
</body>
</html>
